spring.application.name=splitwise-backend

# ===============================
# Database Configuration (MySQL)
# ===============================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / Hibernate
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ===============================
# Server
# ===============================
server.port=${PORT:8080}
server.address=0.0.0.0

jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:900000}
jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION:86400000}
app.cookie.secure=${APP_COOKIE_SECURE:false}

# Email Configuration (Brevo API)
brevo.api.key=${BREVO_API_KEY}
brevo.sender.email=${BREVO_SENDER_EMAIL}
brevo.sender.name=${BREVO_SENDER_NAME:Splitwise}

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}
app.backend.base-url=${BACKEND_BASE_URL:http://localhost:8080}
